<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Priority – AI Intelligence Center</title>
  <link rel="stylesheet" href="style.css">
  <audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
</head>
<body>
  <div class="container">
    <!-- Sidebar: Intelligence & Context -->
    <aside class="sidebar">
      <header>
        <div class="status-indicator">
          <span class="pulse-pro"></span>
          <span id="connectionStatus" style="font-size: 0.65rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-left: 0.5rem;">SECURE CONNECT</span>
        </div>
        <h1 class="pro-header-glow">Never miss what matters.</h1>
        <p>Advanced AI Intelligence for your Elite Workstream.</p>
      </header>

      <div class="stats-sidebar">
        <div class="stat-item pro-card">
          <h3>Critical</h3>
          <span id="criticalCount">0</span>
        </div>
        <div class="stat-item pro-card">
          <h3>High</h3>
          <span id="highCount">0</span>
        </div>
        <div class="stat-item pro-card">
          <h3>Medium</h3>
          <span id="mediumCount">0</span>
        </div>
      </div>

      <div class="activity-hub pro-card">
        <h3>Pulse Trend</h3>
        <div class="trend-container">
          <svg id="trendGraph" width="100%" height="80" viewBox="0 0 200 80" preserveAspectRatio="none">
            <path id="trendPath" d="M0,80 L200,80" fill="none" stroke="var(--brand-primary)" stroke-width="2.5" vector-effect="non-scaling-stroke"></path>
          </svg>
        </div>
      </div>

      <button id="enableNotificationsBtn" class="pro-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        Enable Intel Alerts
      </button>
    </aside>

    <!-- Main Feed: Professional Stream -->
    <main class="main-feed">
      <div class="feed-controls">
        <div class="search-field">
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="searchInput" placeholder="Search signals or commands...">
        </div>
        
        <div class="filter-group">
          <button id="refreshBtn" class="pill-btn sync-btn" title="Force Sync">🔄 SYNC</button>
          <button class="pill-btn pro-filter active" data-filter="priority">Focus (Score)</button>
          <button class="pill-btn pro-filter" data-filter="newest">Recent (Time)</button>
        </div>

        <div class="category-filters" style="display: flex; gap: 0.5rem; margin-top: 1rem; width: 100%;">
          <button class="pill-btn pro-category active" data-category="all">All Signals</button>
          <button class="pill-btn pro-category" data-category="work">Enterprise</button>
          <button class="pill-btn pro-category" data-category="urgency">Urgent</button>
          <button class="pill-btn pro-category" data-category="personal">Private</button>
        </div>
      </div>

      <div id="emailContainer" class="feed-stream">
        <div class="placeholder pro-card" style="text-align: center; border-style: dashed; opacity: 0.5;">
          <p>Awaiting Intelligence Stream...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
